# Firebase App Hosting configuration
# This file bridges environment variables from the console/secrets to the application runtime.
kind: "AppHostingYaml"
schemaVersion: "v1"

environmentVariables:
  - variable: DATABASE_URL
    secret: DATABASE_URL
  - variable: DATABASE_AUTH_TOKEN
    secret: DATABASE_AUTH_TOKEN
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
  - variable: AUTH_GOOGLE_ID
    secret: AUTH_GOOGLE_ID
  - variable: AUTH_GOOGLE_SECRET
    secret: AUTH_GOOGLE_SECRET
  - variable: DEV_PASSWORD
    secret: DEV_PASSWORD
  - variable: SMTP_HOST
    secret: SMTP_HOST
  - variable: SMTP_PORT
    secret: SMTP_PORT
  - variable: SMTP_USER
    secret: SMTP_USER
  - variable: SMTP_PASS
    secret: SMTP_PASS
  - variable: SMTP_FROM
    secret: SMTP_FROM
  - variable: AUTH_TRUST_HOST
    value: "true"
